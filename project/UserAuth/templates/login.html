{% extends "base.html" %}

{% block title %}Login{% endblock title %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

  <div class="w-full max-w-5xl grid lg:grid-cols-2 gap-8 items-center">

    <!-- 🔹 Form Section -->
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200">

   

      <h2 class="text-2xl font-semibold text-gray-800 mb-2">Sign in</h2>
      <p class="text-sm text-gray-500 mb-6">
        Welcome back! Please enter your details.
      </p>

      <form method="POST" class="space-y-5">
        {% csrf_token %}

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input 
            type="text" 
            name="username"
            placeholder="Enter username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          >
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input 
            type="password" 
            name="password"
            placeholder="Enter password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          >
        </div>

        <!-- Options -->
        <div class="flex justify-between items-center text-sm">
          <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" name="remember" class="accent-blue-600">
            Remember me
          </label>
          <a href="#" class="text-blue-600 hover:underline">
            Forgot password?
          </a>
        </div>

        <!-- Button -->
        <button 
          type="submit"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition"
        >
          Sign in
        </button>

        <!-- Register -->
        <p class="text-sm text-center text-gray-500">
          Don’t have an account?
          <a href="{% url 'register' %}" class="text-blue-600 hover:underline font-medium">
            Register
          </a>
        </p>

      </form>
    </div>

    <!-- 🔹 Image Section -->
    <div class="hidden lg:block">
      <img 
        src="https://readymadeui.com/login-image.webp" 
        alt="login"
        class="w-full rounded-xl object-cover"
      >
    </div>

  </div>

</div>

{% endblock content %}
